<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Kova</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #fafafa;
            --color-bg-warm: #f5f3f0;
            --color-primary: #6d5cff;
            --color-primary-dark: #5849e0;
            --color-primary-light: #8b7dff;
            --color-accent: #ff6b4a;
            --color-success: #10b981;
            --color-error: #ef4444;
            --color-text: #1a1a2e;
            --color-text-secondary: #64648c;
            --color-text-muted: #9494b8;
            --color-border: #e8e8f0;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.08);
            --shadow-primary: 0 8px 30px rgba(109, 92, 255, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: linear-gradient(135deg, var(--color-bg) 0%, var(--color-bg-warm) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.5rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--color-primary);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .header-link {
            color: var(--color-text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .header-link:hover {
            color: var(--color-text);
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
        }

        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--color-text);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--color-text-secondary);
            font-size: 0.95rem;
        }

        .selected-plan {
            background: linear-gradient(135deg, rgba(109, 92, 255, 0.1), rgba(255, 107, 74, 0.1));
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .selected-plan .plan-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .selected-plan .plan-badge {
            background: var(--color-primary);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .selected-plan .plan-name {
            font-weight: 700;
            color: var(--color-text);
        }

        .selected-plan .plan-price {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }

        .selected-plan .change-plan {
            color: var(--color-primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: var(--font-main);
            transition: all 0.3s ease;
            background: var(--color-bg);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(109, 92, 255, 0.1);
        }

        .form-input::placeholder {
            color: var(--color-text-muted);
        }

        .form-input.error {
            border-color: var(--color-error);
        }

        .form-hint {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            margin-top: 0.35rem;
        }

        .password-requirements {
            background: var(--color-bg);
            border-radius: 8px;
            padding: 0.75rem;
            margin-top: 0.5rem;
        }

        .password-requirements ul {
            list-style: none;
            font-size: 0.8rem;
            color: var(--color-text-muted);
        }

        .password-requirements li {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.2rem 0;
        }

        .password-requirements li.valid {
            color: var(--color-success);
        }

        .password-requirements li::before {
            content: '\2022';
            font-size: 1.2em;
        }

        .password-requirements li.valid::before {
            content: '\2713';
        }

        .checkbox-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .checkbox-wrapper input {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            accent-color: var(--color-primary);
            flex-shrink: 0;
        }

        .checkbox-wrapper label {
            font-size: 0.875rem;
            color: var(--color-text-secondary);
            line-height: 1.5;
        }

        .checkbox-wrapper label a {
            color: var(--color-primary);
            text-decoration: none;
        }

        .checkbox-wrapper label a:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--font-main);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-primary);
        }

        .btn-submit:hover {
            background: var(--color-primary-dark);
            transform: translateY(-2px);
        }

        .btn-submit:disabled {
            background: var(--color-text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            gap: 1rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--color-border);
        }

        .divider span {
            color: var(--color-text-muted);
            font-size: 0.85rem;
        }

        .social-btn {
            width: 100%;
            padding: 0.875rem;
            background: white;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            font-family: var(--font-main);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            color: var(--color-text);
        }

        .social-btn:hover {
            background: var(--color-bg);
            border-color: var(--color-text-muted);
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--color-border);
        }

        .auth-footer p {
            color: var(--color-text-secondary);
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--color-error);
            padding: 0.875rem 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            color: var(--color-success);
            padding: 0.875rem 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 640px) {
            header {
                padding: 1rem 1.5rem;
            }

            .auth-card {
                padding: 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">
            <div class="logo-icon">K</div>
            Kova
        </a>
        <a href="/login" class="header-link">Ya tengo cuenta</a>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Crea tu cuenta</h1>
                    <p>Comienza tu prueba gratuita de 14 dias</p>
                </div>

                <div class="selected-plan" id="selectedPlan" style="display: none;">
                    <div class="plan-info">
                        <span class="plan-badge">Plan seleccionado</span>
                        <span class="plan-name" id="planName">Growth</span>
                        <span class="plan-price" id="planPrice">$349/mes</span>
                    </div>
                    <a href="/#pricing" class="change-plan">Cambiar</a>
                </div>

                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>

                <form id="registerForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="firstName">Nombre</label>
                            <input
                                type="text"
                                id="firstName"
                                class="form-input"
                                placeholder="Tu nombre"
                                required
                            >
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="lastName">Apellido</label>
                            <input
                                type="text"
                                id="lastName"
                                class="form-input"
                                placeholder="Tu apellido"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input
                            type="email"
                            id="email"
                            class="form-input"
                            placeholder="tu@email.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="company">Nombre de tu tienda</label>
                        <input
                            type="text"
                            id="company"
                            class="form-input"
                            placeholder="Mi Tienda"
                        >
                        <p class="form-hint">Opcional - puedes agregarlo despues</p>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Contrasena</label>
                        <input
                            type="password"
                            id="password"
                            class="form-input"
                            placeholder="Crea una contrasena segura"
                            required
                        >
                        <div class="password-requirements">
                            <ul>
                                <li id="req-length">Minimo 8 caracteres</li>
                                <li id="req-upper">Una mayuscula</li>
                                <li id="req-number">Un numero</li>
                            </ul>
                        </div>
                    </div>

                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">
                            Acepto los <a href="#">Terminos de Servicio</a> y la <a href="#">Politica de Privacidad</a>
                        </label>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">
                        Crear cuenta gratis
                    </button>
                </form>

                <div class="divider">
                    <span>o registrate con</span>
                </div>

                <button class="social-btn" id="googleBtn">
                    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Google
                </button>

                <div class="auth-footer">
                    <p>Ya tienes una cuenta? <a href="/login">Iniciar sesion</a></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const form = document.getElementById('registerForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');
        const passwordInput = document.getElementById('password');

        // Check URL params for plan
        const urlParams = new URLSearchParams(window.location.search);
        const selectedPlan = urlParams.get('plan');

        const plans = {
            starter: { name: 'Starter', price: '$149/mes' },
            growth: { name: 'Growth', price: '$349/mes' },
            pro: { name: 'Pro', price: '$599/mes' },
        };

        if (selectedPlan && plans[selectedPlan]) {
            document.getElementById('selectedPlan').style.display = 'flex';
            document.getElementById('planName').textContent = plans[selectedPlan].name;
            document.getElementById('planPrice').textContent = plans[selectedPlan].price;
        }

        // Password validation
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;

            const reqLength = document.getElementById('req-length');
            const reqUpper = document.getElementById('req-upper');
            const reqNumber = document.getElementById('req-number');

            reqLength.classList.toggle('valid', password.length >= 8);
            reqUpper.classList.toggle('valid', /[A-Z]/.test(password));
            reqNumber.classList.toggle('valid', /[0-9]/.test(password));
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const company = document.getElementById('company').value;
            const password = document.getElementById('password').value;

            // Validate password
            if (password.length < 8 || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
                errorMessage.textContent = 'La contrasena no cumple con los requisitos';
                errorMessage.classList.add('show');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creando cuenta...';
            errorMessage.classList.remove('show');

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        firstName,
                        lastName,
                        email,
                        company,
                        password,
                        plan: selectedPlan || 'starter',
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Error al crear la cuenta');
                }

                // Store token
                localStorage.setItem('auth_token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                successMessage.textContent = 'Cuenta creada exitosamente! Redirigiendo...';
                successMessage.classList.add('show');

                // Redirect to admin panel
                setTimeout(() => {
                    window.location.href = '/admin';
                }, 1500);

            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Crear cuenta gratis';
            }
        });

        // Google login (placeholder)
        document.getElementById('googleBtn').addEventListener('click', () => {
            alert('Google login coming soon!');
        });
    </script>
</body>
</html>
