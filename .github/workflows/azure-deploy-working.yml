name: Deploy to Azure - Working Version

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: naay-agent-app1763504937
  NODE_VERSION: '20.x'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        cd backend
        npm ci --only=production
        cd ../frontend-admin
        npm ci

    - name: Build frontend
      run: |
        cd frontend-admin
        npm run build

    - name: Build WordPress plugin
      run: |
        chmod +x ./scripts/build-wp-plugin.sh
        ./scripts/build-wp-plugin.sh
        echo "📁 Checking plugin ZIP location:"
        ls -la backend/public/downloads/ || echo "Directory not found"

    - name: Build backend
      run: |
        cd backend
        npm run build
        echo "📁 Verifying plugin ZIP in dist:"
        ls -la dist/public/downloads/ || echo "Directory not found in dist"

    - name: Create deployment package
      run: |
        mkdir azure-deploy
        
        # Copy built application
        cp -r backend/dist azure-deploy/
        cp -r backend/node_modules azure-deploy/
        
        # Create app.js entry point for Azure PM2
        cat > azure-deploy/app.js << 'EOF'
        // Azure App Service entry point
        // This file is required by Azure's PM2 configuration
        require('./dist/index.js');
        EOF
        
        # Create package.json for Azure
        cat > azure-deploy/package.json << 'EOF'
        {
          "name": "naay-agent",
          "version": "1.0.0",
          "main": "app.js",
          "scripts": {
            "start": "node app.js"
          },
          "engines": {
            "node": "20.x"
          }
        }
        EOF
        
        # Create web.config for IIS
        cat > azure-deploy/web.config << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <system.webServer>
            <handlers>
              <add name="iisnode" path="dist/index.js" verb="*" modules="iisnode"/>
            </handlers>
            <rewrite>
              <rules>
                <rule name="DynamicContent">
                  <conditions>
                    <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
                  </conditions>
                  <action type="Rewrite" url="dist/index.js"/>
                </rule>
              </rules>
            </rewrite>
            <iisnode node_env="production" />
          </system.webServer>
        </configuration>
        EOF

        # Verify plugin ZIP is in deployment package
        echo "📁 Final verification - Plugin ZIP in azure-deploy:"
        ls -la azure-deploy/dist/public/downloads/ || echo "Plugin ZIP not found!"

    - name: Upload deployment artifact
      uses: actions/upload-artifact@v4
      with:
        name: azure-app
        path: azure-deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: 'Production'
      url: https://naay-agent-app1763504937.azurewebsites.net
    concurrency:
      group: production-deployment
      cancel-in-progress: false

    steps:
    - name: Download deployment artifact
      uses: actions/download-artifact@v4
      with:
        name: azure-app

    - name: Wait to avoid deployment conflicts
      run: |
        echo "⏳ Waiting 30 seconds to avoid any deployment conflicts..."
        sleep 30

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: 'Production'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
        package: .
        clean: true
        restart: true
      timeout-minutes: 10

    - name: Verify deployment
      run: |
        echo "🚀 Deployment completed!"
        echo "🌐 Waiting 45 seconds for app to start..."
        sleep 45
        curl -f https://naay-agent-app1763504937.azurewebsites.net/health || echo "Health check failed - app may still be starting"