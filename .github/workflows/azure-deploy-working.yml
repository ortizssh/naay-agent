name: Deploy to Azure - Working Version

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: naay-agent-app1763504937
  NODE_VERSION: '20.x'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        cd backend
        npm ci --only=production

    - name: Build backend
      run: |
        cd backend
        npm run build

    - name: Create deployment package
      run: |
        mkdir azure-deploy
        
        # Copy built application
        cp -r backend/dist azure-deploy/
        cp -r backend/node_modules azure-deploy/
        
        # Create package.json for Azure
        cat > azure-deploy/package.json << 'EOF'
        {
          "name": "naay-agent",
          "version": "1.0.0",
          "main": "dist/index.js",
          "scripts": {
            "start": "node dist/index.js"
          },
          "engines": {
            "node": "20.x"
          }
        }
        EOF
        
        # Create web.config for IIS
        cat > azure-deploy/web.config << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <system.webServer>
            <handlers>
              <add name="iisnode" path="dist/index.js" verb="*" modules="iisnode"/>
            </handlers>
            <rewrite>
              <rules>
                <rule name="DynamicContent">
                  <conditions>
                    <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
                  </conditions>
                  <action type="Rewrite" url="dist/index.js"/>
                </rule>
              </rules>
            </rewrite>
            <iisnode node_env="production" />
          </system.webServer>
        </configuration>
        EOF

    - name: Upload deployment artifact
      uses: actions/upload-artifact@v4
      with:
        name: azure-app
        path: azure-deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: 'Production'
      url: https://naay-agent-app1763504937.azurewebsites.net

    steps:
    - name: Download deployment artifact
      uses: actions/download-artifact@v4
      with:
        name: azure-app

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: 'Production'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
        package: .
        clean: true

    - name: Verify deployment
      run: |
        echo "🚀 Deployment completed!"
        echo "🌐 Waiting 30 seconds for app to start..."
        sleep 30
        curl -f https://naay-agent-app1763504937.azurewebsites.net/health || echo "Health check failed - app may still be starting"