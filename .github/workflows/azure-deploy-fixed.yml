name: "[DISABLED] Fixed Azure Deployment - REPLACED BY azure-deploy-ultimate.yml"

on:
  # DISABLED - Using azure-deploy-ultimate.yml instead
  # push:
  #   branches: [ main ]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even if there are conflicts'
        required: false
        default: false
        type: boolean

env:
  AZURE_WEBAPP_NAME: naay-agent-app1763504937
  NODE_VERSION: '20.x'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install root dependencies
      run: npm ci

    - name: Install backend dependencies
      run: |
        cd backend
        npm ci --only=production

    - name: Build backend
      run: |
        cd backend
        npm run build

    - name: Prepare deployment package
      run: |
        # Create clean deployment directory
        rm -rf deploy-package
        mkdir -p deploy-package
        
        # Copy built backend
        cp -r backend/dist deploy-package/
        cp -r backend/node_modules deploy-package/
        
        # Copy essential files
        cp backend/package.json deploy-package/
        
        # Create startup script for Azure
        cat > deploy-package/server.js << 'EOF'
        const path = require('path');
        
        // Set NODE_ENV to production if not set
        if (!process.env.NODE_ENV) {
          process.env.NODE_ENV = 'production';
        }
        
        // Start the application
        require('./dist/index.js');
        EOF
        
        # Create package.json for Azure
        cat > deploy-package/package.json << 'EOF'
        {
          "name": "naay-agent-production",
          "version": "1.0.0",
          "description": "Naay Agent - Azure Production",
          "main": "server.js",
          "scripts": {
            "start": "node server.js",
            "postinstall": "echo 'Production deploy ready'"
          },
          "engines": {
            "node": ">=20.0.0"
          },
          "dependencies": {
            "@shopify/admin-api-client": "^1.0.0",
            "@shopify/storefront-api-client": "^1.0.0",
            "@supabase/supabase-js": "^2.38.0",
            "express": "^4.18.2",
            "express-rate-limit": "^7.1.0",
            "cors": "^2.8.5",
            "helmet": "^7.0.0",
            "winston": "^3.10.0",
            "jsonwebtoken": "^9.0.0",
            "openai": "^4.12.0",
            "uuid": "^9.0.0",
            "bullmq": "^4.10.0",
            "ioredis": "^5.3.2"
          }
        }
        EOF
        
        # Create web.config for IIS
        cat > deploy-package/web.config << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <system.webServer>
            <handlers>
              <add name="iisnode" path="server.js" verb="*" modules="iisnode"/>
            </handlers>
            <rewrite>
              <rules>
                <rule name="NodeInspector" patternSyntax="ECMAScript" stopProcessing="true">
                  <match url="^server.js\/debug[\/]?" />
                </rule>
                <rule name="StaticContent">
                  <action type="Rewrite" url="public{REQUEST_URI}"/>
                </rule>
                <rule name="DynamicContent">
                  <conditions>
                    <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
                  </conditions>
                  <action type="Rewrite" url="server.js"/>
                </rule>
              </rules>
            </rewrite>
            <iisnode 
              node_env="production"
              nodeProcessCountPerApplication="1"
              maxConcurrentRequestsPerProcess="1024"
              maxNamedPipeConnectionRetry="3"
              namedPipeConnectionRetryDelay="2000"
              maxNamedPipeConnectionPoolSize="512"
              maxNamedPipePooledConnectionAge="30000"
              asyncCompletionThreadCount="0"
              initialRequestBufferSize="4096"
              maxRequestBufferSize="65536"
              watchedFiles="*.js"
              uncFileChangesPollingInterval="5000"
              gracefulShutdownTimeout="60000"
              loggingEnabled="false"
              logDirectory="iisnode"
              debuggingEnabled="false"
              debugHeaderEnabled="false"
              debuggerPortRange="5058-6058"
              debuggerPathSegment="debug"
              maxLogFileSizeInKB="128"
              appendToExistingLog="false"
              logFileFlushInterval="5000"
              devErrorsEnabled="false"
              flushResponse="false"
              enableXFF="false"
              promoteServerVars="" />
          </system.webServer>
        </configuration>
        EOF
        
        echo "✅ Deployment package prepared"
        ls -la deploy-package/

    - name: Upload deployment artifact
      uses: actions/upload-artifact@v4
      with:
        name: azure-deployment
        path: deploy-package/
        retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Download deployment artifact
      uses: actions/download-artifact@v4
      with:
        name: azure-deployment
        path: ./deploy

    - name: Verify deployment package
      run: |
        echo "📦 Verifying deployment package contents:"
        ls -la ./deploy/
        echo "📋 Package.json contents:"
        cat ./deploy/package.json

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
      continue-on-error: true

    - name: Force stop Azure Web App to resolve 409 conflicts
      run: |
        echo "🛑 Stopping Azure Web App to resolve deployment conflicts..."
        az webapp stop --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group naay-agent-rg || echo "Stop command failed - continuing"
        sleep 30
        echo "✅ App stopped, proceeding with deployment"
      continue-on-error: true

    - name: Deploy to Azure Web App (Attempt 1)
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: 'Production'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
        package: ./deploy
        clean: true
        restart: true
      env:
        SCM_DO_BUILD_DURING_DEPLOYMENT: false
      continue-on-error: true
      timeout-minutes: 15

    - name: Retry deployment if first attempt failed
      if: failure()
      run: |
        echo "🔄 First deployment failed, waiting and retrying..."
        sleep 60
        
    - name: Deploy to Azure Web App (Attempt 2 - Retry)
      if: failure()
      id: deploy-to-webapp-retry
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: 'Production'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
        package: ./deploy
        clean: true
        restart: true
      env:
        SCM_DO_BUILD_DURING_DEPLOYMENT: false
      timeout-minutes: 15

    - name: Verify deployment
      run: |
        echo "🚀 Deployment completed successfully!"
        echo "🌐 Application URL: ${{ steps.deploy-to-webapp.outputs.webapp-url }}"