name: Deploy to Azure App Service

on:
  push:
    branches: [ main, production ]
  pull_request:
    branches: [ main ]

env:
  AZURE_WEBAPP_NAME: naay-agent-app1763504937    # Set this to your app name
  AZURE_WEBAPP_PACKAGE_PATH: './backend'   # Set this to the path to your backend
  NODE_VERSION: '18.x'                     # Set this to the node version to use

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.npm
          node_modules
          backend/node_modules
          frontend-widget/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install root dependencies
      run: npm ci

    - name: Install backend dependencies
      run: |
        cd backend
        npm ci

    - name: Install widget dependencies
      run: |
        cd frontend-widget
        npm ci

    - name: Lint code
      run: |
        npm run lint
        cd backend && npm run lint

    - name: Run backend tests
      run: |
        cd backend
        npm run test

    - name: Build backend
      run: |
        cd backend
        npm run build

    - name: Build widget
      run: |
        cd frontend-widget
        npm run build

    - name: Create deployment package
      run: |
        # Create deployment directory
        mkdir -p deploy-package
        
        # Copy backend build
        cp -r backend/dist deploy-package/
        cp -r backend/node_modules deploy-package/
        cp backend/package.json deploy-package/
        
        # Copy other necessary files
        cp -r database deploy-package/
        cp -r scripts deploy-package/
        
        # Copy widget build to serve as static assets
        mkdir -p deploy-package/public/widget
        cp -r frontend-widget/dist/* deploy-package/public/widget/
        
        # Create production package.json
        cat > deploy-package/package.json << 'EOF'
        {
          "name": "naay-agent-backend",
          "version": "1.0.0",
          "description": "Naay Agent Backend - Production",
          "main": "dist/index.js",
          "scripts": {
            "start": "node dist/index.js"
          },
          "engines": {
            "node": "18.x"
          }
        }
        EOF

    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v4
      with:
        name: node-app
        path: deploy-package/

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: node-app

    - name: 'Deploy to Azure Web App'
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: 'Production'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
        package: .

  deploy-staging:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    environment:
      name: 'Staging'
      url: ${{ steps.deploy-to-staging.outputs.webapp-url }}

    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: node-app

    - name: 'Deploy to Azure Web App - Staging'
      id: deploy-to-staging
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: 'staging'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_STAGING }}
        package: .