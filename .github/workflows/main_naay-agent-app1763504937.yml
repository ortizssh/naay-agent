name: Build and deploy Node.js app to Azure Web App - naay-agent-app1763504937

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: naay-agent-app1763504937
  NODE_VERSION: '20.x'

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.npm
          node_modules
          backend/node_modules
          frontend-widget/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install root dependencies
      run: npm ci

    - name: Install backend dependencies
      run: |
        cd backend
        npm ci

    - name: Install widget dependencies
      run: |
        cd frontend-widget
        npm ci

    - name: Lint code
      run: |
        npm run lint

    - name: Build backend
      run: |
        cd backend
        npm run build

    - name: Build widget
      run: |
        cd frontend-widget
        npm run build

    - name: Create deployment package
      run: |
        # Create deployment directory
        mkdir -p deploy-package
        
        # Copy backend build
        cp -r backend/dist deploy-package/
        cp -r backend/node_modules deploy-package/
        
        # Copy root files needed
        cp package.json deploy-package/
        cp startup.js deploy-package/
        
        # Copy test deployment as fallback
        cp -r test-deploy deploy-package/ 2>/dev/null || echo "No test-deploy folder"
        
        # Copy other necessary files
        cp -r database deploy-package/ 2>/dev/null || echo "No database folder"
        cp -r scripts deploy-package/ 2>/dev/null || echo "No scripts folder"
        
        # Copy widget build to serve as static assets
        mkdir -p deploy-package/public/widget
        cp -r frontend-widget/dist/* deploy-package/public/widget/ 2>/dev/null || echo "No widget build"
        
        # Create web.config for Azure
        cat > deploy-package/web.config << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <system.webServer>
            <webSocket enabled="false" />
            <handlers>
              <add name="iisnode" path="startup.js" verb="*" modules="iisnode"/>
            </handlers>
            <rewrite>
              <rules>
                <rule name="DynamicContent">
                  <conditions>
                    <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
                  </conditions>
                  <action type="Rewrite" url="startup.js"/>
                </rule>
              </rules>
            </rewrite>
            <iisnode watchedFiles="web.config;*.js" node_env="production" />
          </system.webServer>
        </configuration>
        EOF

    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v4
      with:
        name: node-app
        path: deploy-package/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    if: github.ref == 'refs/heads/main'
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: node-app
    
    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_069CBAC8FC674590B89E992DB0EC4BB2 }}
        tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_736928D450B74CADBCBD1D6EBF3C4CF2 }}
        subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8BF76284CBE34B8092AC444B62942528 }}

    - name: 'Deploy to Azure Web App'
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: 'Production'
        package: .

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    if: github.event_name == 'pull_request'
    environment:
      name: 'Staging'
      url: ${{ steps.deploy-to-staging.outputs.webapp-url }}

    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: node-app
    
    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_069CBAC8FC674590B89E992DB0EC4BB2 }}
        tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_736928D450B74CADBCBD1D6EBF3C4CF2 }}
        subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8BF76284CBE34B8092AC444B62942528 }}

    - name: 'Deploy to Azure Web App - Staging'
      id: deploy-to-staging
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: 'staging'
        package: .