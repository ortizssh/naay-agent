name: Build and deploy Node.js app to Azure Web App - naay-agent-app1763504937

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: naay-agent-app1763504937
  NODE_VERSION: '20.x'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.npm
          node_modules
          backend/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install root dependencies
      run: npm ci

    - name: Create backend node_modules using production package.json
      run: |
        # Create a temporary directory for backend dependencies
        mkdir -p temp-backend-deps
        
        # Create the same package.json that works in production
        cat > temp-backend-deps/package.json << 'EOF'
        {
          "name": "naay-agent-backend-deps",
          "version": "1.0.0",
          "dependencies": {
            "@shopify/admin-api-client": "^1.0.0",
            "@shopify/storefront-api-client": "^1.0.0",
            "@supabase/supabase-js": "^2.38.0",
            "express": "^4.18.2",
            "express-rate-limit": "^7.1.0",
            "cors": "^2.8.5",
            "helmet": "^7.0.0",
            "dotenv": "^16.3.1",
            "winston": "^3.10.0",
            "joi": "^17.9.2",
            "jsonwebtoken": "^9.0.0",
            "axios": "^1.5.0",
            "bullmq": "^4.10.0",
            "ioredis": "^5.3.2",
            "openai": "^4.12.0",
            "uuid": "^9.0.0",
            "tsc-alias": "^1.8.8"
          }
        }
        EOF
        
        # Install dependencies in temp directory
        cd temp-backend-deps
        npm install --only=production
        
        # Copy node_modules to backend directory
        cp -r node_modules ../backend/
        
        # Verify
        echo "✅ Backend node_modules created successfully"
        ls -la ../backend/node_modules | head -10

    - name: Widget dependencies (skipped - integrated in backend)
      run: |
        echo "✅ Widget is now served directly from backend/public/naay-widget.js"
        echo "✅ No separate frontend-widget build needed"

    - name: Lint code
      run: |
        npm run lint

    - name: Build backend
      run: |
        cd backend
        npm run build
        # Install tsc-alias to resolve path aliases
        npm install tsc-alias --no-save
        # Convert TypeScript path aliases to relative imports in compiled JS
        npx tsc-alias -p tsconfig.deployment.json

    - name: Verify widget is ready
      run: |
        echo "✅ Widget v2.1.0-FINAL ready at backend/public/naay-widget.js"
        ls -la backend/public/naay-widget.js

    - name: Create deployment package
      run: |
        # Create deployment directory
        mkdir -p deploy-package
        
        # Copy backend build maintaining directory structure
        mkdir -p deploy-package/backend
        cp -r backend/dist deploy-package/backend/
        
        # Always copy node_modules - force include for Azure
        if [ -d "backend/node_modules" ]; then
          echo "Copying backend/node_modules to deployment package..."
          # Copy to root level for Azure
          cp -r backend/node_modules deploy-package/
          # Also copy to backend directory for app.js structure
          cp -r backend/node_modules deploy-package/backend/
          echo "✅ node_modules copied successfully ($(ls backend/node_modules | wc -l) packages)"
        else
          echo "ERROR: backend/node_modules not found - cannot proceed"
          ls -la backend/
          exit 1
        fi
        
        # Copy root files needed
        cp app.js deploy-package/
        
        # Copy test deployment as fallback
        cp -r test-deploy deploy-package/ 2>/dev/null || echo "No test-deploy folder"
        
        # Copy other necessary files
        cp -r database deploy-package/ 2>/dev/null || echo "No database folder"
        cp -r scripts deploy-package/ 2>/dev/null || echo "No scripts folder"
        
        # Widget is already included in backend/dist/public (no separate build needed)
        echo "✅ Widget v2.1.0-FINAL included in backend build"
        
        # Create production package.json for dependencies
        cat > deploy-package/package.json << 'EOF'
        {
          "name": "naay-agent-production",
          "version": "1.0.0",
          "description": "Naay Agent - Production Deploy",
          "main": "app.js",
          "scripts": {
            "start": "REDIS_ENABLED=false node app.js",
            "build": "echo 'Build completed in CI'",
            "postinstall": "echo 'Production dependencies installed'"
          },
          "engines": {
            "node": "20.x"
          },
          "dependencies": {
            "@shopify/admin-api-client": "^1.0.0",
            "@shopify/storefront-api-client": "^1.0.0",
            "@supabase/supabase-js": "^2.38.0",
            "express": "^4.18.2",
            "express-rate-limit": "^7.1.0",
            "cors": "^2.8.5",
            "helmet": "^7.0.0",
            "dotenv": "^16.3.1",
            "winston": "^3.10.0",
            "joi": "^17.9.2",
            "jsonwebtoken": "^9.0.0",
            "axios": "^1.5.0",
            "bullmq": "^4.10.0",
            "ioredis": "^5.3.2",
            "openai": "^4.12.0",
            "uuid": "^9.0.0"
          }
        }
        EOF
        
        # Create .deployment file to enable Azure npm install
        cat > deploy-package/.deployment << 'EOF'
        [config]
        SCM_DO_BUILD_DURING_DEPLOYMENT=true
        EOF
        
        # Create web.config for Azure
        cat > deploy-package/web.config << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <system.webServer>
            <webSocket enabled="false" />
            <handlers>
              <add name="iisnode" path="app.js" verb="*" modules="iisnode"/>
            </handlers>
            <rewrite>
              <rules>
                <rule name="DynamicContent">
                  <conditions>
                    <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
                  </conditions>
                  <action type="Rewrite" url="app.js"/>
                </rule>
              </rules>
            </rewrite>
            <iisnode watchedFiles="web.config;*.js" node_env="production" />
          </system.webServer>
        </configuration>
        EOF

    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v4
      with:
        name: node-app
        path: deploy-package/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    if: github.ref == 'refs/heads/main'
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: node-app

    - name: 'Deploy to Azure Web App'
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: 'Production'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
        package: .

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    environment:
      name: 'Staging'
      url: ${{ steps.deploy-to-staging.outputs.webapp-url }}

    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: node-app

    - name: 'Deploy to Azure Web App - Staging'
      id: deploy-to-staging
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: 'staging'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_STAGING }}
        package: .