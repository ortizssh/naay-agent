name: Build and deploy Node.js app to Azure Web App - naay-agent-app1763504937

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: naay-agent-app1763504937
  NODE_VERSION: '20.x'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.npm
          node_modules
          backend/node_modules
          frontend-widget/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install root dependencies
      run: npm ci

    - name: Install backend dependencies
      run: |
        cd backend
        npm ci

    - name: Install widget dependencies
      run: |
        cd frontend-widget
        npm ci

    - name: Lint code
      run: |
        npm run lint

    - name: Build backend
      run: |
        cd backend
        npm run build

    - name: Build widget
      run: |
        cd frontend-widget
        npm run build

    - name: Create deployment package
      run: |
        # Create deployment directory
        mkdir -p deploy-package
        
        # Copy backend build
        cp -r backend/dist deploy-package/
        
        # Only copy node_modules if it exists
        if [ -d "backend/node_modules" ]; then
          cp -r backend/node_modules deploy-package/
        else
          echo "Backend node_modules not found, skipping..."
        fi
        
        # Copy root files needed
        cp startup.js deploy-package/
        
        # Copy test deployment as fallback
        cp -r test-deploy deploy-package/ 2>/dev/null || echo "No test-deploy folder"
        
        # Copy other necessary files
        cp -r database deploy-package/ 2>/dev/null || echo "No database folder"
        cp -r scripts deploy-package/ 2>/dev/null || echo "No scripts folder"
        
        # Copy widget build to serve as static assets
        mkdir -p deploy-package/public/widget
        cp -r frontend-widget/dist/* deploy-package/public/widget/ 2>/dev/null || echo "No widget build"
        
        # Create production package.json for dependencies
        cat > deploy-package/package.json << 'EOF'
        {
          "name": "naay-agent-production",
          "version": "1.0.0",
          "description": "Naay Agent - Production Deploy",
          "main": "startup.js",
          "scripts": {
            "start": "node startup.js",
            "build": "echo 'Build completed in CI'",
            "postinstall": "echo 'Production dependencies installed'"
          },
          "engines": {
            "node": "20.x"
          },
          "dependencies": {
            "@shopify/admin-api-client": "^1.0.0",
            "@shopify/storefront-api-client": "^1.0.0",
            "@supabase/supabase-js": "^2.38.0",
            "express": "^4.18.2",
            "express-rate-limit": "^7.1.0",
            "cors": "^2.8.5",
            "helmet": "^7.0.0",
            "dotenv": "^16.3.1",
            "winston": "^3.10.0",
            "joi": "^17.9.2",
            "jsonwebtoken": "^9.0.0",
            "axios": "^1.5.0",
            "bullmq": "^4.10.0",
            "ioredis": "^5.3.2",
            "openai": "^4.12.0",
            "uuid": "^9.0.0"
          }
        }
        EOF
        
        # Create .deployment file to enable Azure build
        cat > deploy-package/.deployment << 'EOF'
        [config]
        SCM_DO_BUILD_DURING_DEPLOYMENT=true
        EOF
        
        # Create web.config for Azure
        cat > deploy-package/web.config << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <system.webServer>
            <webSocket enabled="false" />
            <handlers>
              <add name="iisnode" path="startup.js" verb="*" modules="iisnode"/>
            </handlers>
            <rewrite>
              <rules>
                <rule name="DynamicContent">
                  <conditions>
                    <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
                  </conditions>
                  <action type="Rewrite" url="startup.js"/>
                </rule>
              </rules>
            </rewrite>
            <iisnode watchedFiles="web.config;*.js" node_env="production" />
          </system.webServer>
        </configuration>
        EOF

    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v4
      with:
        name: node-app
        path: deploy-package/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    if: github.ref == 'refs/heads/main'
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: node-app

    - name: 'Deploy to Azure Web App'
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: 'Production'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
        package: .

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    environment:
      name: 'Staging'
      url: ${{ steps.deploy-to-staging.outputs.webapp-url }}

    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: node-app

    - name: 'Deploy to Azure Web App - Staging'
      id: deploy-to-staging
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: 'staging'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_STAGING }}
        package: .