# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

name = "kova-agent"
client_id = "0172a0c3012d86608e6e7b6234448a03"
application_url = "https://app.heykova.io"
embedded = true

# Modern authentication configuration for 2024
api_version = "2025-10"

[access_scopes]
# Needed for syncing products and creating webhooks
scopes = "read_products,write_products,read_orders,read_customers,write_draft_orders,unauthenticated_read_product_listings"

[auth]
# Modern authentication redirect URLs for Session Token + OAuth flow
redirect_urls = [
  "https://app.heykova.io/auth/callback",
  "https://app.heykova.io/auth/shopify/callback",
  "https://app.heykova.io/api/client/oauth/callback",
]

# Enable session tokens for embedded apps (App Bridge 3.0)
[auth.session_tokens]
enabled = true

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  topics = ["products/create"]
  uri = "https://app.heykova.io/api/webhooks/products/create"

  [[webhooks.subscriptions]]
  topics = ["products/update"] 
  uri = "https://app.heykova.io/api/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = ["products/delete"]
  uri = "https://app.heykova.io/api/webhooks/products/delete"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "https://app.heykova.io/api/webhooks/app/uninstalled"

  # Order webhooks for conversion tracking
  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "https://app.heykova.io/api/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = ["orders/paid"]
  uri = "https://app.heykova.io/api/webhooks/orders/paid"

[pos]
embedded = false