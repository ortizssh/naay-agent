# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

name = "naay-agent"
client_id = "320f3d53829d6a7abf34580ecae44f3e"
application_url = "https://naay-agent-app1763504937.azurewebsites.net"
embedded = true

# Modern authentication configuration for 2024
api_version = "2024-10"

[access_scopes]
# Needed for syncing products and creating webhooks
scopes = "read_products,write_products,read_orders,read_customers,write_draft_orders"

[auth]
# Modern authentication redirect URLs for Session Token + OAuth flow
redirect_urls = [
  "https://naay-agent-app1763504937.azurewebsites.net/auth/callback",
  "https://naay-agent-app1763504937.azurewebsites.net/auth/shopify/callback",
]

# Enable session tokens for embedded apps (App Bridge 3.0)
[auth.session_tokens]
enabled = true

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  topics = ["products/create"]
  uri = "https://naay-agent-app1763504937.azurewebsites.net/api/webhooks/products/create"

  [[webhooks.subscriptions]]
  topics = ["products/update"] 
  uri = "https://naay-agent-app1763504937.azurewebsites.net/api/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = ["products/delete"]
  uri = "https://naay-agent-app1763504937.azurewebsites.net/api/webhooks/products/delete"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "https://naay-agent-app1763504937.azurewebsites.net/api/webhooks/app/uninstalled"

[pos]
embedded = false